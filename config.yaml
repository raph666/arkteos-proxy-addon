name: Arkteos Proxy
version: "1.0.0"
slug: arkteos_proxy
description: Proxy TCP pour PAC Arkteos REG3 — permet les connexions simultanées de Node-RED et de l'app mobile Arkteos.
url: https://github.com/raph666/arkteos-proxy-addon
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
options:
  pac_host: "192.168.X.X"
  pac_port: 9641
  proxy_port: 9641
schema:
  pac_host: str
  pac_port: int
  proxy_port: int
ports:
  9641/tcp: 9641
ports_description:
  9641/tcp: Proxy TCP Arkteos
